function services(c){return c.services.map((s,i)=>`<article class="card service"><div class=num>${i+1}</div><div><h3>${esc(s[0])}</h3><p>${esc(s[1])}</p></div></article>`).join('')}function packs(c){return c.packs.map((p,i)=>`<article class=card><span class=eyebrow>${i===2?'Owner offer':'Customer offer'}</span><h3>${esc(p[0])}</h3><div class=price>${esc(p[1])}</div><p>${esc(p[2])}</p></article>`).join('')}
function gallery(d){let html='';for(let i=1;i<=30;i++)html+=imgTag(d,i,(i==1||i==8||i==17)?'big':'');return html}
function demo(d){let c=cfg(d);document.body.className='page '+c.theme;document.title=title(d);let a=area(d);let ig=d.account&&d.account.startsWith('http')?`<a class="btn alt" href="${esc(d.account)}">Instagram</a>`:`<a class="btn alt" href="#contact">Manual IG check</a>`;document.getElementById('app').innerHTML=`<header class=top><div class="wrap topin"><div class=brand><span class=mark></span><span>${esc(d.name)}</span></div><span class=navpill>${esc(a)} • Kuwait</span></div></header><main class=wrap><section class=hero><div class=hero-card><div class=hero-img><img src="${photo(d,0)}" onerror="this.onerror=null;this.src='${fallback(d,0)}'"><div class=shade></div></div><div class=hero-copy><span class=eyebrow>${esc(c.label)}</span><h1>${esc(c.headline)}</h1><p class=lead>${esc(c.sub)}</p><div class=actions><a class=btn href="${esc(d.wa||'#')}">WhatsApp booking</a>${ig}</div><p class=notice>Demo uses safe stock/fallback visuals. After approval, this becomes their real site with logo, real photos, real prices, map and working booking flow.</p></div></div></section><section class=stats><div class=stat><strong>${esc(d.rating)}</strong><span>Rating signal</span></div><div class=stat><strong>${esc(d.reviews)}</strong><span>Review count</span></div><div class=stat><strong>${esc(d.signal)}</strong><span>Website gap</span></div><div class=stat><strong>${esc(a)}</strong><span>Location block</span></div></section><section class=section><div class=section-title><div><span class=eyebrow>Mobile-first sales page</span><h2>Built for the phone screen first.</h2></div></div><div class=card><p class=muted>Most customers open Instagram links on mobile. This version keeps the decision path simple: strong visual → services → packages → proof → hours/location → WhatsApp CTA. No vague SaaS-style filler.</p></div></section><section class=section id=services><div class=section-title><div><span class=eyebrow>Services</span><h2>Niche-specific menu.</h2></div></div><div class=grid>${services(c)}</div></section><section class=section id=packages><div class=section-title><div><span class=eyebrow>Packages</span><h2>Clear premium offers.</h2></div></div><div class=packages>${packs(c)}</div></section><section class=section id=gallery><div class=section-title><div><span class=eyebrow>Gallery</span><h2>30-image proof wall.</h2></div></div><div class=gallery>${gallery(d)}</div></section><section class=section id=reviews><div class=section-title><div><span class=eyebrow>Trust</span><h2>Reviews layout.</h2></div></div><div class=reviews><article class=card><div class=stars>★★★★★</div><p>“Services and booking are clear on mobile.”</p><p class=muted>Sample layout only</p></article><article class=card><div class=stars>★★★★★</div><p>“Easy to understand packages before messaging.”</p><p class=muted>Replace with Google reviews</p></article><article class=card><div class=stars>★★★★★</div><p>“WhatsApp CTA makes the next step obvious.”</p><p class=muted>Sample layout only</p></article></div></section><section class="section info" id=contact><div class=card><span class=eyebrow>Hours & location</span><h2>${esc(a)}, Kuwait</h2><div class=row><b>Hours</b><span>${esc(c.hours)}</span></div><div class=row><b>Area</b><span>${esc(a)}</span></div><div class=row><b>Phone</b><span>${esc(d.phone||'Add phone')}</span></div></div><div class=card><span class=eyebrow>Booking mockup</span><h2>Request a quote</h2><div class=form><input placeholder="Your name"><input placeholder="WhatsApp number"><select>${c.services.map(s=>`<option>${esc(s[0])}</option>`).join('')}</select><textarea placeholder="What do you need?"></textarea><a class=btn href="${esc(d.wa||'#')}">Send on WhatsApp</a></div></div></section></main><footer class="wrap footer">ShadowRisser premium local-business demo • ${esc(d.name)}</footer><div class=sticky><span>${esc(d.name)}</span><a href="${esc(d.wa||'#')}">WhatsApp</a></div>`}
function list(){document.body.className='page beauty';document.getElementById('app').innerHTML=`<main class=wrap><section class=hero><div class=hero-card><div class=hero-copy><span class=eyebrow>Mobile premium demos</span><h1>Kuwait local-business demo collection.</h1><p class=lead>Fixed image loading, sharper themes, and mobile-first layouts for 30 leads.</p></div></div></section><section class=list>${D.map(d=>`<a href="?demo=${esc(d.slug)}&v=mobilepremium-0626"><div class=card><span class=eyebrow>${esc(cfg(d).label)}</span><h3>${esc(d.name)}</h3><p>${esc(d.handle)} • ${esc(d.signal)}</p></div></a>`).join('')}</section></main>`}
let q=new URLSearchParams(location.search).get('demo'),d=D.find(x=>x.slug===q);d?demo(d):list();
</script></body></html>
