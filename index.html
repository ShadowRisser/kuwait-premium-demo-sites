tomers one clear place to decide and book.</h2><p class=muted>${esc(c.headline)}. Instead of making people scroll old posts or ask basic questions in DM, this page gives them services, packages, trust, location and a direct action.</p><div class=kpi><span>Service menu</span><span>Packages</span><span>Reviews</span><span>WhatsApp CTA</span><span>FAQ</span></div></div><div class=menu>${menu}</div></section><section class=section id=services><div class=head><div><span class=pill>Services</span><h2>Useful sections, not filler.</h2></div><p class=muted>Every card can be replaced with their exact services and pricing.</p></div><div class=grid>${cardServices(c)}</div></section><section class=section id=packages><div class=head><div><span class=pill>Packages</span><h2>Easy pricing structure.</h2></div><p class=muted>These package cards make the demo feel like a real business site.</p></div><div class=packs>${packCards(c)}</div></section><section class=section id=gallery><div class=head><div><span class=pill>Gallery</span><h2>Visual proof area.</h2></div><p class=muted>Replace with approved real photos after the owner replies.</p></div><div class=gallery><div class=gmain style="background-image:url('${esc(c.gallery[0])}')"></div><div class=gside><div style="background-image:url('${esc(c.gallery[1])}')"></div><div style="background-image:url('${esc(c.gallery[2])}')"></div></div></div></section><section class=section id=reviews><div class=head><div><span class=pill>Trust</span><h2>Sample review layout.</h2></div><p class=muted>Not fake reviews — this is where real Google reviews can go.</p></div><div class=reviews><article class=card><div class=stars>★★★★★</div><p>“Clear services and easy booking. This page answers questions fast.”</p><p class=muted>Sample layout</p></article><article class=card><div class=stars>★★★★★</div><p>“Packages, photos and contact are all simple on mobile.”</p><p class=muted>Sample layout</p></article><article class=card><div class=stars>★★★★★</div><p>“The WhatsApp quote flow makes it easy to ask before visiting.”</p><p class=muted>Sample layout</p></article></div></section><section class="section split" id=contact><div class=card><span class=pill>Booking form mockup</span><h2>Request a quote / appointment</h2><div class=form><input placeholder="Your name"><input placeholder="Phone / WhatsApp"><select>${c.services.map(s=>`<option>${esc(s[0])}</option>`).join('')}</select><textarea placeholder="Tell us what you need"></textarea><a class=btn href="${esc(d.wa||'#')}">Send on WhatsApp</a></div></div><div class=card><span class=pill>Kuwait local info</span><h2>Location, hours and contact area.</h2><p class=muted>Business hours, branch address, Google Maps link, service areas and contact methods can go here.</p><div class=row><b>Today</b><span>Open / hours to add</span></div><div class=row><b>Area</b><span>Kuwait</span></div><div class=row><b>Contact</b><span>${esc(d.phone||'Add phone')}</span></div></div></section><section class=section><div class=head><div><span class=pill>FAQ</span><h2>Remove buyer friction.</h2></div></div><div class=faq><details><summary>Can customers book through this?</summary><p class=muted>Yes, the CTA can open WhatsApp, email, booking software, or a Google Sheet lead flow.</p></details><details><summary>Can real photos and services be added?</summary><p class=muted>Yes, everything is replaceable after approval.</p></details><details><summary>Is this only a design?</summary><p class=muted>It can become a working lead/booking page with domain, hosting, forms and automations.</p></details></div></section></main><footer class="wrap footer">ShadowRisser demo system • realistic local-business website concept • ${esc(d.name)}</footer><div class=sticky><span>${esc(d.name)} demo</span><a href="${esc(d.wa||'#')}">WhatsApp CTA</a></div>`}
function list(){document.body.className='beauty';document.getElementById('app').innerHTML=`<main class=wrap><section class=hero><div><span class=pill>30 local-business demos</span><h1 class=h1>Kuwait demo collection rebuilt like real business sites.</h1><p class=lead>Each link opens a personalized demo with services, packages, gallery, review layout, FAQ, booking form and sticky WhatsApp CTA.</p></div></section><section class=demo-list>${D.map(d=>`<a href="?demo=${esc(d.slug)}&v=localsite-0626"><div class=card><span class=pill>${esc(cfg(d).label)}</span><h3>${esc(d.name)}</h3><p>${esc(d.handle)} • ${esc(d.signal)}</p></div></a>`).join('')}</section></main>`}
let q=new URLSearchParams(location.search).get('demo'),d=D.find(x=>x.slug===q);d?demo(d):list();
</script></body></html>
