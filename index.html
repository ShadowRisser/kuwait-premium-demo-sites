n split"><div class=card><span class=pill>Sales problem solved</span><h2>Your Instagram gets attention. This page turns that attention into inquiries.</h2><p class=muted>${esc(c.headline)}. Instead of basic questions sitting in DMs, customers get services, packages, proof, hours, location and one clear action.</p><div class=kpi><span>30-image gallery</span><span>Packages</span><span>Reviews</span><span>Hours/location</span><span>WhatsApp CTA</span></div></div><div class=menu>${menu}</div></section><section class=section id=services><div class=head><div><span class=pill>Services</span><h2>Niche-specific service menu.</h2></div><p class=muted>These sections make the demo feel useful immediately.</p></div><div class=grid>${cards(c.services)}</div></section><section class=section id=packages><div class=head><div><span class=pill>Packages</span><h2>Realistic package cards.</h2></div><p class=muted>Clear offers make the page easier to sell.</p></div><div class=packs>${packages(c)}</div></section><section class=section id=gallery><div class=head><div><span class=pill>Gallery</span><h2>30-image visual gallery.</h2></div><p class=muted>Large visual proof area. Replace with approved real photos after they reply.</p></div><div class=gallery30>${gallery(c,d)}</div></section><section class=section id=reviews><div class=head><div><span class=pill>Trust</span><h2>Review layout + proof section.</h2></div><p class=muted>Sample layout only — their real Google reviews go here.</p></div><div class=reviews><article class=card><div class=stars>★★★★★</div><p>“Clear services and easy booking. This page answers questions fast.”</p><p class=muted>Sample review layout</p></article><article class=card><div class=stars>★★★★★</div><p>“Packages, photos and contact are all simple on mobile.”</p><p class=muted>Sample review layout</p></article><article class=card><div class=stars>★★★★★</div><p>“The WhatsApp quote flow makes it easy to ask before visiting.”</p><p class=muted>Sample review layout</p></article></div></section><section class="section split" id=contact><div class=card><span class=pill>Booking form mockup</span><h2>Request a quote / appointment</h2><div class=form><input placeholder="Your name"><input placeholder="Phone / WhatsApp"><select>${c.services.map(s=>`<option>${esc(s[0])}</option>`).join('')}</select><textarea placeholder="Tell us what you need"></textarea><a class=btn href="${esc(d.wa||'#')}">Send on WhatsApp</a></div></div><div class=card><span class=pill>Hours & location</span><h2>${esc(area)}, Kuwait</h2><p class=muted>Fake-but-clean local info block for the demo. Replace with exact branch, Google Maps and opening hours after approval.</p><div class=row><b>Hours</b><span>${esc(c.hours)}</span></div><div class=row><b>Area</b><span>${esc(area)}</span></div><div class=row><b>Contact</b><span>${esc(d.phone||'Add phone')}</span></div></div></section><section class=section><div class=faq><details><summary>Can this become a real working site?</summary><p class=muted>Yes. It can connect to WhatsApp, email, Google Sheets, CRM, booking tools, and a domain.</p></details><details><summary>Can real photos replace these images?</summary><p class=muted>Yes. These are placeholders only. Approved business photos should replace them.</p></details><details><summary>Why is this better than only Instagram?</summary><p class=muted>Instagram creates attention; this page collects inquiries and reduces repetitive questions.</p></details></div></section></main><footer class="wrap footer">ShadowRisser demo system • sales-focused local-business website concept • ${esc(d.name)}</footer><div class=sticky><span>${esc(d.name)} demo</span><a href="${esc(d.wa||'#')}">WhatsApp CTA</a></div>`}
function list(){document.body.className='beauty';document.getElementById('app').innerHTML=`<main class=wrap><section class=hero><div><span class=pill>30 local-business demos</span><h1 class=h1>Kuwait demo collection with 30-image galleries.</h1><p class=lead>Each link opens a personalized demo with services, packages, 30-image gallery, reviews, FAQ, hours/location and WhatsApp CTA.</p></div></section><section class=demo-list>${D.map(d=>`<a href="?demo=${esc(d.slug)}&v=localpro-0626"><div class=card><span class=pill>${esc(cfg(d).label)}</span><h3>${esc(d.name)}</h3><p>${esc(d.handle)} • ${esc(d.signal)}</p></div></a>`).join('')}</section></main>`}
let q=new URLSearchParams(location.search).get('demo'),d=D.find(x=>x.slug===q);d?demo(d):list();
</script></body></html>
